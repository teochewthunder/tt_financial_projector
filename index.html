<!DOCTYPE html>
<html>
  <head>
    <title>Financial Projector</title>
    <style>

    </style>
  </head>

  <body>

    <div id="fpApp">
      <div id="pnlFinancialProjection">
        <div class="header">
          <div class="monthName"></div>
          <div class="in"></div>
          <div class="out"></div>
          <div class="remaining"></div>
          <div class="cumulative"></div>          
        </div>
        <div class="row">
          <div class="monthName"></div>
          <div class="in"></div>
          <div class="out"></div>
          <div class="remaining"></div>
          <div class="cumulative"></div>
        </div>
        <div class="footer">
          <div class="monthName">Total</div>
          <div class="in"></div>
          <div class="out"></div>
          <div class="remaining"></div>
          <div class="cumulative"></div>
        </div>
      </div>

      <div id="pnlItem">
        <label>
          Month:
          <select ref="itemMonth" v-model="items[currentIndex].month">
            <option v-for="(month, index) in months" v-bind:key="index" v-bind:value="index">
              {{ month }}
            </option>
          </select>
        </label>
        <label>
          Name
          <input ref="itemName" v-bind:value="items[currentIndex].name">
        </label>
        <label>
          Type
          <input ref="itemTypeIn" name="type" type="radio" v-bind:checked="items[currentIndex].amount > 0">
          <input ref="itemTypeOut" name="type" type="radio" v-bind:checked="items[currentIndex].amount < 0">
        </label>
        <label>
          Amount
          <input ref="itemAmount" type="number" v-bind:value="Math.abs(items[currentIndex].amount)">
        </label>
        <input type="button" v-bind:value="currentIndex == 0 ? 'ADD' : 'UPDATE'" @click="addItem" />
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>

    <script>
      new Vue({
        el: '#fpApp',
        data: {
          currentIndex: 0,
          items:[
            {
              name: "",
              month: 0,
              amount: 100
            }
          ],
          months: [
            "All", "Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
          ]
        },
        methods: {
          addItem: function() {
            let nameValue = this.$refs.itemName.value;
            let amountValue = parseFloat(this.$refs.itemAmount.value);
            if (this.$refs.itemTypeOut.checked) amountValue = amountValue * -1;
            let monthValue = parseInt(this.$refs.itemMonth.value);

            this.items.push({
              name: nameValue,
              month: monthValue,
              amount: amountValue
            });

            console.log(this.items);
          },
          removeItem: function(index) {

          },
          showItem: function(index) {

          },
          orderItemsByMonth: function() {

          }
        }
      });
    </script>
  </body>
</html>
